<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SaharaCare AI - Emergency SOS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                    "primary": "#21c45d",
                    "emergency": "#dc2626",
                    "background-light": "#f6f8f7",
                    "background-dark": "#122017",
                },
                fontFamily: {
                    "display": ["Lexend", "sans-serif"]
                },
                borderRadius: {
                "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }

        .sos-pulse {
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(220, 38, 38, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);
            }
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex
    flex-col">
    <div class="layout-container flex h-full grow flex-col">
        <!-- Top Navigation -->
        <header class="flex items-center justify-between border-b border-primary/10 px-6 py-4 bg-white
            dark:bg-background-dark">
            <div class="flex items-center gap-3">
                <div class="text-primary">
                    <span class="material-symbols-outlined text-3xl">medical_services</span>
                </div>
                <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">SaharaCare AI</h2>
            </div>
            <button onclick="location.href='dashboard.html' " class="flex items-center justify-center rounded-full
                size-10 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">
                <span class="material-symbols-outlined">close</span>
            </button>
        </header>
        <main class="flex-1 flex flex-col items-center justify-between py-10 px-6 max-w-md mx-auto w-full">
            <!-- Alert Status -->
            <div class="text-center">
                <h1 class="text-emergency text-4xl font-extrabold tracking-tighter uppercase mb-2">Emergency SOS</h1>
                <p id="sos-status" class="text-slate-600 dark:text-slate-400 text-lg font-medium">Tap the button to
                    call for help</p>
            </div>
            <!-- Massive SOS Button -->
            <div class="relative flex items-center justify-center py-12">
                <button id="sos-btn" class="flex flex-col items-center justify-center rounded-full size-64
                    bg-emergency text-white shadow-2xl transition-transform active:scale-90 border-8 border-white
                    dark:border-slate-900">
                    <span class="material-symbols-outlined text-7xl mb-2">call</span>
                    <span class="text-2xl font-black tracking-widest uppercase">SOS</span>
                    <span class="text-xs font-bold opacity-80 mt-1">TAP TO CALL</span>
                </button>
            </div>
        </main>
    </div>
    <script src="js/sos.js"></script>
</body>

</html>
