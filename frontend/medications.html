<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                    "primary": "#21c45d",
                    "background-light": "#f6f8f7",
                    "background-dark": "#122017",
                },
                fontFamily: {
                    "display": ["Lexend", "sans-serif"]
                },
                borderRadius: {
                "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <title>SaharaCare AI - My Medications</title>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100
    min-h-screen">
    <div class="layout-container flex h-full grow flex-col">
        <!-- Top Navigation Bar -->
        <header class="flex items-center justify-between border-b border-primary/10 bg-white dark:bg-slate-900 px-6
            py-4 sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <a class="flex items-center gap-2 hover:opacity-80 transition-opacity" href="dashboard.html">
                    <span class="material-symbols-outlined text-primary text-3xl">arrow_back</span>
                    <span class="text-lg font-bold tracking-tight">Dashboard</span>
                </a>
            </div>
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-black text-primary">SaharaCare AI</h2>
            </div>
            <div class="flex items-center">
                <button class="p-2 rounded-full bg-primary/10 text-primary">
                    <span class="material-symbols-outlined text-2xl">notifications</span>
                </button>
            </div>
        </header>
        <main class="max-w-2xl mx-auto w-full px-4 py-8">
            <!-- Header Section -->
            <div class="mb-8">
                <h1 class="text-4xl font-black tracking-tight mb-2">My Medications</h1>
                <p class="text-slate-600 dark:text-slate-400 text-lg">Today</p>
            </div>
            <!-- Medication List -->
            <div id="medication-list" class="flex flex-col gap-6">
            </div>
            <!-- Accessibility Note / Help -->
            <div class="mt-12 p-6 bg-primary/5 rounded-xl border-2 border-dashed border-primary/20 flex items-center
                gap-4">
                <div class="bg-primary text-white p-3 rounded-full">
                    <span class="material-symbols-outlined text-3xl">support_agent</span>
                </div>
                <div>
                    <p class="font-bold text-lg">Need help with your meds?</p>
                    <p class="text-slate-600 dark:text-slate-400">Tap here to call your caregiver or doctor.</p>
                </div>
            </div>
        </main>
        <!-- Bottom Tab Bar -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-primary/10 px-6 py-4 flex
            justify-around items-center z-50">
            <a class="flex flex-col items-center gap-1 text-slate-400" href="dashboard.html">
                <span class="material-symbols-outlined text-3xl">home</span>
                <span class="text-xs font-bold uppercase">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary" href="medications.html">
                <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL'
                    1">pill</span>
                <span class="text-xs font-bold uppercase tracking-widest">Meds</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="healthlogs.html">
                <span class="material-symbols-outlined text-3xl">favorite</span>
                <span class="text-xs font-bold uppercase">Health</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined text-3xl">person</span>
                <span class="text-xs font-bold uppercase">Me</span>
            </a>
        </nav>
        <!-- Padding for bottom nav -->
        <div class="h-24"></div>
    </div>

    <script src="js/medication.js"></script>
</body>

</html>
